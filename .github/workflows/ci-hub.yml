# ci-hub.yml — thin caller for dutiona/papers-material. INERT F3 / #245 variant (A3): issue_comment + workflow_dispatch
# ONLY. The schedule trigger (needs-review scanner) is added by #246 — a scheduled workflow fires as
# soon as it lands on a default branch. This caller pins ITS OWN owner's hub (dutiona/ci-hub) at an
# immutable 40-hex SHA (A1); a cross-owner reference is drift.
name: ci-hub
on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        required: true
        type: number
      review_kind:
        required: false
        type: choice
        options: [code, plan]
        default: code
      reviewers:
        required: false
        type: string
        default: auto
      plan_path:
        required: false
        type: string
        default: plan.md   # spec-file-first: plan review reads THIS path at the reviewed head (A11)
  # schedule:                       # ADDED BY #246 (A3) — do NOT enable before runners exist.
  #   - cron: "39 * * * *"   # needs-review scanner; see specs/workflow-contracts.md#3
  #   The scanner authenticates the labeler and binds the captured head SHA (A4).

permissions:
  contents: read
  pull-requests: write

jobs:
  parse:
    # The owner actor guard DOMINATES both event branches (it is a top-level conjunct): a
    # workflow_dispatch by any non-dutiona account is refused BEFORE the self-hosted job starts.
    # The comment path additionally requires the owner comment author + the comment being on a PR.
    if: >-
      ${{ github.actor == 'dutiona' &&
          (github.event_name == 'workflow_dispatch' ||
           (github.event_name == 'issue_comment' &&
            github.event.comment.user.login == 'dutiona' &&
            github.event.issue.pull_request)) }}
    runs-on: [self-hosted, mini]
    outputs:
      run: ${{ steps.p.outputs.run }}
      kind: ${{ steps.p.outputs.kind }}
      pr: ${{ steps.p.outputs.pr }}
      reviewers: ${{ steps.p.outputs.reviewers }}
      plan_path: ${{ steps.p.outputs.plan_path }}
    steps:
      - name: parse exact command (untrusted body via env, never interpolated)
        id: p
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          DISPATCH_KIND: ${{ github.event.inputs.review_kind }}
          DISPATCH_PR: ${{ github.event.inputs.pr_number }}
          DISPATCH_REVIEWERS: ${{ github.event.inputs.reviewers }}
          DISPATCH_PLAN_PATH: ${{ github.event.inputs.plan_path }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          run=false; kind=""; pr=""; reviewers=auto; plan_path=plan.md
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Dispatch inputs are typed (number/choice/string) and owner-only (guarded above), so they
            # are trusted routing values — forwarded to the wrapper, never interpolated into a command.
            run=true; kind="${DISPATCH_KIND:-code}"; pr="$DISPATCH_PR"
            reviewers="${DISPATCH_REVIEWERS:-auto}"; plan_path="${DISPATCH_PLAN_PATH:-plan.md}"
          else
            # Normalize CRLF + surrounding ASCII whitespace, then accept ONLY the entire single line.
            cmd="$(printf '%s' "$COMMENT_BODY" | tr -d '\r' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$cmd" in
              "/review")      run=true; kind=code; pr="$ISSUE_NUMBER" ;;
              "/review-plan") run=true; kind=plan; pr="$ISSUE_NUMBER" ;;
              *)              run=false ;;
            esac
          fi
          echo "run=$run"             >>"$GITHUB_OUTPUT"
          echo "kind=$kind"           >>"$GITHUB_OUTPUT"
          echo "pr=$pr"               >>"$GITHUB_OUTPUT"
          echo "reviewers=$reviewers" >>"$GITHUB_OUTPUT"
          echo "plan_path=$plan_path" >>"$GITHUB_OUTPUT"

  code-review:
    needs: parse
    if: ${{ needs.parse.outputs.run == 'true' && needs.parse.outputs.kind == 'code' }}
    uses: dutiona/ci-hub/.github/workflows/review.yml@c97559c398ad0f4803d48b952a557ec992b7b940
    with:
      pr_number: ${{ fromJSON(needs.parse.outputs.pr) }}
      reviewers: ${{ needs.parse.outputs.reviewers }}

  plan-review:
    needs: parse
    if: ${{ needs.parse.outputs.run == 'true' && needs.parse.outputs.kind == 'plan' }}
    uses: dutiona/ci-hub/.github/workflows/plan-review.yml@c97559c398ad0f4803d48b952a557ec992b7b940
    with:
      pr_number: ${{ fromJSON(needs.parse.outputs.pr) }}
      reviewers: ${{ needs.parse.outputs.reviewers }}
      plan_path: ${{ needs.parse.outputs.plan_path }}
